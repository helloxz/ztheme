<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 - 访问受限</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%)}
.card{max-width:440px;width:100%;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.08);padding:48px 36px 40px;text-align:center}
.icon-wrap{width:80px;height:80px;margin:0 auto 24px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center}
.icon-wrap svg{width:40px;height:40px;color:#ef4444}
h1{font-size:52px;font-weight:800;color:#1e293b;margin-bottom:4px;line-height:1.1}
.subtitle{font-size:18px;color:#94a3b8;margin-bottom:24px}
.desc{font-size:15px;color:#475569;line-height:1.7;margin-bottom:32px}
.url-box{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.url-box input{flex:1;min-width:0;border:none;background:transparent;font-size:13px;color:#334155;outline:none;cursor:text}
.url-box input::selection{background:#bfdbfe}
.copy-btn{flex-shrink:0;padding:8px 18px;background:#3b82f6;color:#fff;font-size:13px;font-weight:500;border:none;border-radius:8px;cursor:pointer;transition:background .2s}
.copy-btn:hover{background:#2563eb}
.copy-btn:active{background:#1d4ed8}
.copy-btn.success{background:#10b981}
.copy-btn.success:hover{background:#059669}
.msg{font-size:13px;height:18px;transition:opacity .3s;opacity:0}
.msg.show{opacity:1}
.msg.ok{color:#10b981}
.msg.fail{color:#ef4444}
@media(max-width:480px){
.card{padding:36px 24px 32px;border-radius:16px}
h1{font-size:42px}
.icon-wrap{width:68px;height:68px}
.icon-wrap svg{width:34px;height:34px}
.url-box{flex-direction:column;gap:10px}
.url-box input{text-align:center;width:100%;font-size:12px}
.copy-btn{width:100%;padding:10px}
}
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
  </div>
  <h1>403</h1>
  <p class="subtitle">访问受限</p>
  <p class="desc">当前浏览器不支持访问此页面，请手动复制链接到其它浏览器打开。</p>
  <div class="url-box">
    <input id="blocked-url" type="text" value="{{URL}}" readonly onclick="this.select()">
    <button id="copy-btn" class="copy-btn" onclick="copyUrl()">复制链接</button>
  </div>
  <p id="copy-msg" class="msg"></p>
</div>
<script>
function copyUrl(){var a=document.getElementById("blocked-url"),b=document.getElementById("copy-btn"),c=document.getElementById("copy-msg");navigator.clipboard?navigator.clipboard.writeText(a.value).then(function(){showOk(b,c)}).catch(function(){fb(a,b,c)}):fb(a,b,c)}
function fb(a,b,c){a.select();try{document.execCommand("copy");showOk(b,c)}catch(d){c.textContent="复制失败，请手动选中复制";c.className="msg show fail"}}
function showOk(b,c){b.textContent="已复制";b.className="copy-btn success";c.textContent="链接已复制到剪贴板";c.className="msg show ok";setTimeout(function(){b.textContent="复制链接";b.className="copy-btn";c.className="msg"},3000)}
</script>
</body>
</html>
